<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Biometric Laboratory Dashboard</title>
    <meta
      name="description"
      content="This web application provides an intuitive dashboard for biometric laboratories, enabling efficient management and analysis of AI-driven biometric data."
    />
    <meta name="robots" content="noindex, nofollow" />
    <!-- Plotly powers the interactive charts returned by the backend (/chat visuals) -->
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>
    <!-- Fonts used by the backend-rendered visuals (cards, tables, charts) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }
      #root {
        height: 100%;
      }
    </style>
    <!-- Set the colour theme before first paint so there is no light→dark flash.
         Mirrors the logic in src/lib/theme-mode.ts (stored choice, else system). -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("sgrh-theme");
          var dark = stored
            ? stored === "dark"
            : window.matchMedia("(prefers-color-scheme: dark)").matches;
          document.documentElement.classList.toggle("dark", dark);
        } catch (e) {
          /* storage/matchMedia unavailable — default to light */
        }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
